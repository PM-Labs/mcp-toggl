steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/toggl-mcp:$BUILD_ID
      - .
    dir: toggl

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/toggl-mcp:$BUILD_ID

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - toggl-mcp
      - --image=australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/toggl-mcp:$BUILD_ID
      - --platform=managed
      - --region=australia-southeast1
      - --allow-unauthenticated
      - --memory=256Mi
      - --cpu=1
      - --min-instances=1
      - --max-instances=3
      - --set-secrets=MCP_AUTH_TOKEN=toggl-mcp-service-token:latest

images:
  - australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/toggl-mcp:$BUILD_ID
